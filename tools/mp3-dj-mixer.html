<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Mixer - ToolBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        /* =========================================
           THEME VARIABLES
        ========================================= */
        :root, [data-theme="dark"] {
            --bg-body: #050505; --bg-card: #171717; --bg-card-hover: rgba(23, 23, 23, 0.6);
            --bg-nav: rgba(5, 5, 5, 0.8); --bg-footer: #030303; --bg-input: #171717;
            --text-primary: #ffffff; --text-secondary: #a3a3a3; --text-tertiary: #737373;
            --text-muted: #525252; --border-primary: rgba(255, 255, 255, 0.05);
            --border-secondary: rgba(255, 255, 255, 0.1); --accent-bg: rgba(59, 130, 246, 0.1);
            --scrollbar-track: #0a0a0a; --scrollbar-thumb: #333; --shadow-card: none;
            --slider-track: #333; --inner-bg: rgba(0,0,0,0.2);
        }
        [data-theme="light"] {
            --bg-body: #f5f5f5; --bg-card: #ffffff; --bg-card-hover: rgba(255, 255, 255, 0.9);
            --bg-nav: rgba(245, 245, 245, 0.85); --bg-footer: #e5e5e5; --bg-input: #ffffff;
            --text-primary: #111111; --text-secondary: #555555; --text-tertiary: #777777;
            --text-muted: #999999; --border-primary: rgba(0, 0, 0, 0.08);
            --border-secondary: rgba(0, 0, 0, 0.12); --accent-bg: rgba(59, 130, 246, 0.08);
            --scrollbar-track: #e5e5e5; --scrollbar-thumb: #c0c0c0;
            --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --slider-track: #d1d5db; --inner-bg: rgba(0,0,0,0.04);
        }

        body { background: var(--bg-body); color: var(--text-primary); transition: background 0.35s ease, color 0.35s ease; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

        /* =========================================
           FIXED SLIDER CSS (Cross-browser)
        ========================================= */
        input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; width: 100%; }
        
        /* Track Styles */
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: var(--slider-track); border-radius: 4px; }
        input[type="range"]::-moz-range-track { height: 4px; background: var(--slider-track); border-radius: 4px; border: none; }
        
        /* Thumb Styles */
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: white; margin-top: -5px; box-shadow: 0 0 5px rgba(0,0,0,0.3); border: none; }
        input[type="range"]::-moz-range-thumb { height: 14px; width: 14px; border-radius: 50%; background: white; box-shadow: 0 0 5px rgba(0,0,0,0.3); border: none; }
        
        /* Deck Specific Thumbs */
        .deck-a input[type="range"]::-webkit-slider-thumb { background: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.4); }
        .deck-a input[type="range"]::-moz-range-thumb { background: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.4); }
        .deck-b input[type="range"]::-webkit-slider-thumb { background: #a855f7; box-shadow: 0 0 8px rgba(168,85,247,0.4); }
        .deck-b input[type="range"]::-moz-range-thumb { background: #a855f7; box-shadow: 0 0 8px rgba(168,85,247,0.4); }
        .master-section input[type="range"]::-webkit-slider-thumb { background: #f43f5e; box-shadow: 0 0 8px rgba(244,63,94,0.4); }
        .master-section input[type="range"]::-moz-range-thumb { background: #f43f5e; box-shadow: 0 0 8px rgba(244,63,94,0.4); }
        
        /* Vertical Slider Styles */
        .v-slider { writing-mode: vertical-lr; direction: rtl; height: 80px; width: 24px; }
        .v-slider::-webkit-slider-runnable-track { width: 4px; height: 100%; }
        .v-slider::-moz-range-track { width: 4px; height: 100%; }
        .v-slider::-webkit-slider-thumb { margin-left: -5px; margin-top: 0; }
        .v-slider::-moz-range-thumb { margin-left: -5px; margin-top: 0; }

        /* Glow Effects */
        .glow-cyan { box-shadow: 0 0 20px rgba(34,211,238,0.1); }
        .glow-purple { box-shadow: 0 0 20px rgba(168,85,247,0.1); }
        .glow-red { box-shadow: 0 0 20px rgba(244,63,94,0.1); }
        
        .pulse-rec { animation: pulseRec 1s infinite; }
        @keyframes pulseRec { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        canvas { image-rendering: pixelated; cursor: pointer; }

        /* Themed Utility Classes */
        .bg-theme-nav { background: var(--bg-nav); border-bottom: 1px solid var(--border-primary); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .bg-theme-card { background: var(--bg-card); border: 1px solid var(--border-primary); box-shadow: var(--shadow-card); transition: background 0.35s, border-color 0.35s; }
        .bg-theme-inner { background: var(--inner-bg); border: 1px solid var(--border-primary); transition: background 0.35s, border-color 0.35s; }
        .text-theme-primary { color: var(--text-primary); }
        .text-theme-secondary { color: var(--text-secondary); }
        .text-theme-muted { color: var(--text-muted); }
        .border-theme { border-color: var(--border-primary); }
    </style>
</head>
<body class="text-theme-primary min-h-screen flex flex-col">

                    <div class="flex items-center justify-center gap-3 mb-4">

                        <button onclick="playDeck('B')" id="playBtnB" class="w-14 h-14 bg-purple-500 rounded-full flex items-center justify-center hover:bg-purple-400 text-black shadow-lg shadow-purple-500/30"><i data-lucide="play" class="w-6 h-6" id="playIconB"></i></button>
                        <button onclick="stopDeck('B')" class="w-10 h-10 bg-theme-inner rounded-full flex items-center justify-center hover:opacity-80 text-theme-secondary transition"><i data-lucide="square" class="w-4 h-4"></i></button>

                    </div>

                    <div class="flex-1 grid grid-cols-4 gap-3 mt-auto">
                        <div class="flex flex-col items-center bg-theme-inner rounded-xl p-2">
                            <span class="text-[9px] text-theme-muted uppercase tracking-wider mb-2">Vol</span>
                            <input type="range" min="0" max="1" step="0.01" value="1" class="v-slider" oninput="changeVolume('B', this.value)">
                        </div>
                        <div class="flex flex-col items-center bg-theme-inner rounded-xl p-2 space-y-2">
                            <span class="text-[9px] text-theme-muted uppercase tracking-wider">EQ</span>
                            <div class="flex items-center gap-1 w-full"><span class="text-[8px] text-purple-400 w-3">H</span><input type="range" min="-12" max="12" value="0" class="w-full h-1" oninput="changeEQ('B', 'high', this.value)"></div>
                            <div class="flex items-center gap-1 w-full"><span class="text-[8px] text-purple-400 w-3">M</span><input type="range" min="-12" max="12" value="0" class="w-full h-1" oninput="changeEQ('B', 'mid', this.value)"></div>
                            <div class="flex items-center gap-1 w-full"><span class="text-[8px] text-purple-400 w-3">L</span><input type="range" min="-12" max="12" value="0" class="w-full h-1" oninput="changeEQ('B', 'low', this.value)"></div>
                        </div>

                            <div class="flex items-center gap-1 w-full"><span class="text-[8px] text-purple-400 w-3">🏃</span><input type="range" min="0" max="1" step="0.01" value="0" class="w-full h-1" oninput="changeDelay('B', this.value)"></div>
                            <div class="flex items-center gap-1 w-full"><span class="text-[8px] text-purple-400 w-3">〰️</span><input type="range" min="0" max="1" step="0.01" value="0" class="w-full h-1" oninput="changeFilter('B', this.value)"></div>
                        </div>

    <script>
    // =============================================
    //  🎨 THEME SYSTEM (Backend only, respects home page toggle)
    // =============================================
    function getSystemTheme() { return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }
    function initTheme() { const saved = localStorage.getItem('toolbox-theme'); const theme = saved || getSystemTheme(); document.documentElement.setAttribute('data-theme', theme); }
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => { if (!localStorage.getItem('toolbox-theme')) { document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark'); } });
    // Listen for storage changes from other pages (Home page toggle)
    window.addEventListener('storage', (e) => { if (e.key === 'toolbox-theme') initTheme(); });
    initTheme();

    // =============================================
    //  WEB AUDIO API SETUP
    // =============================================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = audioCtx.createGain();
    const streamDest = audioCtx.createMediaStreamDestination(); 
    
    masterGain.connect(audioCtx.destination); 
    masterGain.connect(streamDest);           

    const decks = {
        A: { audio: new Audio(), isLoaded: false, isPlaying: false, isLooping: false, isSpinning: false, spinInterval: null },
        B: { audio: new Audio(), isLoaded: false, isPlaying: false, isLooping: false, isSpinning: false, spinInterval: null }
    };

    Object.keys(decks).forEach(id => {
        const d = decks[id];
        d.gain = audioCtx.createGain();
        d.analyser = audioCtx.createAnalyser();
        d.pan = audioCtx.createStereoPanner(); 
        d.eq = { high: audioCtx.createBiquadFilter(), mid: audioCtx.createBiquadFilter(), low: audioCtx.createBiquadFilter() };
        d.eq.high.type = 'highshelf'; d.eq.high.frequency.value = 3200;
        d.eq.mid.type = 'peaking'; d.eq.mid.frequency.value = 1000; d.eq.mid.Q.value = 0.5;
        d.eq.low.type = 'lowshelf'; d.eq.low.frequency.value = 320;

        d.delay = audioCtx.createDelay(5.0);
        d.delayGain = audioCtx.createGain(); 
        d.filterFX = audioCtx.createBiquadFilter(); d.filterFX.type = 'lowpass'; d.filterFX.frequency.value = 20000;

        d.eq.low.connect(d.eq.mid);
        d.eq.mid.connect(d.eq.high);
        d.eq.high.connect(d.filterFX);
        d.filterFX.connect(d.pan);
        d.pan.connect(d.gain);
        
        d.gain.connect(d.delay);
        d.delay.connect(d.delayGain);
        d.delayGain.connect(d.delay); 
        d.delayGain.gain.value = 0; 
        d.delay.connect(d.pan); 

        d.gain.connect(d.analyser);
        d.analyser.connect(masterGain);
    });

    // =============================================
    //  RECORDING & MERGE LOGIC
    // =============================================
    let mediaRecorder; let recordedChunks = []; let isRecording = false; let recInterval; let recSeconds = 0; let resultBlobUrl = null;

    function toggleRecord() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!isRecording) {
            mediaRecorder = new MediaRecorder(streamDest.stream, { mimeType: 'audio/webm' });
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                if(resultBlobUrl) URL.revokeObjectURL(resultBlobUrl);
                resultBlobUrl = URL.createObjectURL(blob);
                document.getElementById('downloadBtn').disabled = false;
            };
            recordedChunks = [];
            mediaRecorder.start();
            isRecording = true; recSeconds = 0;
            document.getElementById('recDot').classList.add('bg-red-500', 'pulse-rec');
            document.getElementById('recBtn').textContent = 'STOP';
            document.getElementById('downloadBtn').disabled = true;
            recInterval = setInterval(() => {
                recSeconds++;
                const m = Math.floor(recSeconds / 60).toString().padStart(2, '0');
                const s = (recSeconds % 60).toString().padStart(2, '0');
                document.getElementById('recTime').textContent = `${m}:${s}`;
            }, 1000);
        } else {
            mediaRecorder.stop(); isRecording = false; clearInterval(recInterval);
            document.getElementById('recDot').classList.remove('bg-red-500', 'pulse-rec');
            document.getElementById('recBtn').textContent = 'REC';
        }
    }

    function downloadMix() {
        if(!resultBlobUrl) return;
        const a = document.createElement('a'); a.href = resultBlobUrl; a.download = 'DJ_Mix_Recording.webm';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    // =============================================
    //  TRACK LOADING & WAVEFORM
    // =============================================
    function loadTrack(deckId, input) {
        const file = input.files[0]; if (!file) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const d = decks[deckId];
        d.audio.pause(); if (d.isLoaded) d.source.disconnect();

        d.audio = new Audio(); d.audio.src = URL.createObjectURL(file);
        d.audio.loop = d.isLooping; d.source = audioCtx.createMediaElementSource(d.audio);
        d.source.connect(d.eq.low);
        d.isLoaded = true; d.isPlaying = false;
        document.getElementById(`fileName${deckId}`).textContent = file.name.substring(0, 15) + '.mp3';
        d.audio.addEventListener('loadedmetadata', () => drawStaticWave(deckId));
        d.audio.addEventListener('ended', () => { if(!d.isLooping) stopDeck(deckId); });
    }

    function drawStaticWave(deckId) {
        const canvas = document.getElementById(`wave${deckId}`); const ctx = canvas.getContext('2d');
        canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const color = deckId === 'A' ? '#22d3ee' : '#a855f7'; ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.beginPath();
        for(let i=0; i<canvas.width; i++) { const h = Math.random() * canvas.height * 0.6; ctx.moveTo(i, canvas.height/2 - h/2); ctx.lineTo(i, canvas.height/2 + h/2); }
        ctx.stroke();
        canvas.onclick = (e) => { const d = decks[deckId]; if (!d.isLoaded) return; const rect = canvas.getBoundingClientRect(); const x = e.clientX - rect.left; const percent = x / canvas.width; d.audio.currentTime = percent * d.audio.duration; };
    }

    function animateWave(deckId) {
        const d = decks[deckId]; const canvas = document.getElementById(`wave${deckId}`); const ctx = canvas.getContext('2d'); const playhead = document.getElementById(`playhead${deckId}`); const analyser = d.analyser;
        analyser.fftSize = 256; const bufferLength = analyser.frequencyBinCount; const dataArray = new Uint8Array(bufferLength);
        function draw() {
            if (!d.isPlaying) return; requestAnimationFrame(draw); analyser.getByteFrequencyData(dataArray);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / bufferLength) * 2.5; let x = 0; const color = deckId === 'A' ? '#22d3ee' : '#a855f7';
            for(let i = 0; i < bufferLength; i++) { const barHeight = (dataArray[i] / 255) * canvas.height; ctx.fillStyle = color; ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight); x += barWidth + 1; }
            const progress = (d.audio.currentTime / d.audio.duration) * 100; playhead.style.left = progress + '%';
        }
        draw();
    }

    // =============================================
    //  TRANSPORT CONTROLS
    // =============================================
    function playDeck(deckId) {
        const d = decks[deckId]; if (!d.isLoaded) return alert("Load a track first!");
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const icon = document.getElementById(`playIcon${deckId}`); const status = document.getElementById(`status${deckId}`);
        if (d.isPlaying) { d.audio.pause(); d.isPlaying = false; icon.setAttribute('data-lucide', 'play'); status.classList.remove('bg-green-500'); status.classList.add(deckId === 'A' ? 'bg-cyan-500' : 'bg-purple-500'); }
        else { d.audio.play(); d.isPlaying = true; icon.setAttribute('data-lucide', 'pause'); status.classList.add('bg-green-500'); status.classList.remove('bg-cyan-500', 'bg-purple-500'); animateWave(deckId); }
        lucide.createIcons();
    }

    function stopDeck(deckId) {
        const d = decks[deckId]; if(!d.isLoaded) return; d.audio.pause(); d.audio.currentTime = 0; d.isPlaying = false;
        document.getElementById(`playIcon${deckId}`).setAttribute('data-lucide', 'play'); const status = document.getElementById(`status${deckId}`); status.classList.remove('bg-green-500'); status.classList.add(deckId === 'A' ? 'bg-cyan-500' : 'bg-purple-500'); lucide.createIcons();
    }

    function cueDeck(deckId) { const d = decks[deckId]; if(d.isLoaded) d.audio.currentTime = 0; }

    function toggleLoop(deckId) {
        const d = decks[deckId]; if(!d.isLoaded) return; d.isLooping = !d.isLooping; d.audio.loop = d.isLooping;
        const btn = document.getElementById(`loopBtn${deckId}`); btn.classList.toggle('bg-green-500/30'); btn.classList.toggle('text-green-400');
    }

    // =============================================
    //  MIXER & FX CONTROLS
    // =============================================
    function changeVolume(id, val) { decks[id].gain.gain.value = val; }
    function changeMaster(val) { masterGain.gain.value = val; }
    function changeEQ(id, band, val) { decks[id].eq[band].gain.value = val; }
    function changePan(id, val) { decks[id].pan.pan.value = val; }
    function crossfade(val) { decks.A.gain.gain.value = Math.cos(val * Math.PI / 2); decks.B.gain.gain.value = Math.sin(val * Math.PI / 2); }
    function changeDelay(id, val) { decks[id].delay.delayTime.value = val * 1.0; decks[id].delayGain.gain.value = val * 0.8; }
    function changeFilter(id, val) { const freq = 20000 - (val * 19900); decks[id].filterFX.frequency.value = freq; }

    function toggle3DSpin(deckId) {
        const d = decks[deckId]; const btn = document.getElementById(`spinBtn${deckId}`);
        if (d.isSpinning) { clearInterval(d.spinInterval); d.pan.pan.value = 0; d.isSpinning = false; btn.classList.remove('bg-green-500/30', 'text-green-400'); }
        else { let angle = 0; d.isSpinning = true; btn.classList.add('bg-green-500/30', 'text-green-400'); d.spinInterval = setInterval(() => { if (!d.isPlaying) return; angle += 0.15; d.pan.pan.value = Math.sin(angle); }, 30); }
    }

    window.onload = () => { lucide.createIcons(); drawStaticWave('A'); drawStaticWave('B'); };
    </script>
