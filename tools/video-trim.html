<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Trim - ToolBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        /* =========================================
           THEME VARIABLES — Light & Dark
        ========================================= */
        :root, [data-theme="dark"] {
            --bg-body: #050505; --bg-card: rgba(23, 23, 23, 0.3); --bg-nav: rgba(5, 5, 5, 0.8);
            --bg-footer: #030303; --bg-input: #171717; --bg-dropzone-hover: rgba(255,255,255,0.02);
            --text-primary: #ffffff; --text-secondary: #a3a3a3; --text-tertiary: #737373;
            --text-muted: #525252; --border-primary: rgba(255, 255, 255, 0.05);
            --border-secondary: rgba(255, 255, 255, 0.1); --scrollbar-track: #0a0a0a; --scrollbar-thumb: #333;
            --accent-bg: rgba(34,197,94,0.1); --accent-border: rgba(34,197,94,0.2); --accent-text: #4ade80;
            --accent-solid: #22c55e;
        }

        [data-theme="light"] {
            --bg-body: #f5f5f5; --bg-card: #ffffff; --bg-nav: rgba(245, 245, 245, 0.85);
            --bg-footer: #e5e5e5; --bg-input: #f9fafb; --bg-dropzone-hover: rgba(0,0,0,0.02);
            --text-primary: #111111; --text-secondary: #555555; --text-tertiary: #777777;
            --text-muted: #999999; --border-primary: #e5e7eb; --border-secondary: #d1d5db;
            --scrollbar-track: #e5e5e5; --scrollbar-thumb: #c0c0c0;
            --accent-bg: rgba(34,197,94,0.08); --accent-border: rgba(34,197,94,0.2); --accent-text: #16a34a;
            --accent-solid: #22c55e;
        }

        body { background: var(--bg-body); color: var(--text-primary); transition: background 0.35s ease, color 0.35s ease; }
        
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

        input[type="text"] { background: var(--bg-input); border: 1px solid var(--border-secondary); color: var(--text-primary); transition: all 0.2s; }
        input[type="text"]:focus { outline: none; border-color: var(--accent-border); box-shadow: 0 0 0 2px var(--accent-bg); }
        input[type="text"]::placeholder { color: var(--text-muted); }
    </style>
</head>
<body class="min-h-screen">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 h-16 backdrop-blur-xl" style="background: var(--bg-nav); border-bottom: 1px solid var(--border-primary);">
        <div class="max-w-7xl mx-auto h-full px-6 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-2.5">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="wrench" class="w-4 h-4 text-white"></i>
                </div>
                <span class="text-lg font-semibold tracking-tight" style="color: var(--text-primary)">Tool<span class="text-blue-400">Box</span></span>
            </a>
            <a href="../index.html" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all" style="color: var(--text-tertiary);" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-tertiary)'">
                <i data-lucide="home" class="w-4 h-4"></i> Home
            </a>
        </div>
    </nav>

    <main class="pt-16">
        <div class="max-w-5xl mx-auto px-6 py-12">

            <!-- Breadcrumb -->
            <div class="animate-fade-up flex items-center gap-2 text-sm mb-8" style="color: var(--text-muted)">
                <a href="../index.html" class="hover:opacity-80 transition-opacity flex items-center gap-1.5">
                    <i data-lucide="home" class="w-3.5 h-3.5"></i> Home
                </a>
                <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
                <span>Video</span>
                <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
                <span style="color: var(--text-secondary)">Video Trim</span>
            </div>

            <!-- Tool Header -->
            <div class="animate-fade-up flex flex-col md:flex-row md:items-center gap-6 mb-10">
                <div class="w-16 h-16 rounded-2xl border flex items-center justify-center shrink-0"
                     style="background: var(--accent-bg); border-color: var(--accent-border)">
                    <i data-lucide="scissors" class="w-7 h-7" style="color: var(--accent-text)"></i>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-medium tracking-tight mb-2" style="color: var(--text-primary)">Video Trim</h1>
                    <p class="font-light leading-relaxed" style="color: var(--text-tertiary)">Cut and trim video clips to the exact length you need.</p>
                </div>
            </div>

            <!-- Workspace -->
            <div class="animate-fade-up rounded-2xl border overflow-hidden" style="background: var(--bg-card); border-color: var(--border-primary)">

                <div id="dropZone" class="p-12 text-center border-b cursor-pointer transition-colors" style="border-color: var(--border-primary);" onmouseover="this.style.background='var(--bg-dropzone-hover)'" onmouseout="this.style.background='transparent'" onclick="document.getElementById('fileInput').click()">
                    <div class="w-16 h-16 rounded-full border-2 border-dashed flex items-center justify-center mx-auto mb-4" style="border-color: var(--border-secondary)">
                        <i data-lucide="upload-cloud" class="w-7 h-7" style="color: var(--text-muted)"></i>
                    </div>
                    <p class="font-medium mb-1" style="color: var(--text-secondary)">Drop your video here or click to browse</p>
                    <p class="text-sm" style="color: var(--text-muted)">Supports: MP4, WebM, MOV</p>
                    <input type="file" id="fileInput" accept="video/*" class="hidden" onchange="handleFile(this)">
                </div>

                <div id="fileInfo" class="hidden p-6 border-b" style="border-color: var(--border-primary)">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: var(--accent-bg)">
                                <i data-lucide="scissors" class="w-5 h-5" style="color: var(--accent-text)"></i>
                            </div>
                            <div>
                                <p id="fileName" class="text-sm font-medium" style="color: var(--text-primary)"></p>
                                <p id="fileSize" class="text-xs" style="color: var(--text-muted)"></p>
                            </div>
                        </div>
                        <button onclick="removeFile()" class="p-2 rounded-lg transition-colors" style="color: var(--text-muted);" onmouseover="this.style.background='var(--bg-dropzone-hover)'" onmouseout="this.style.background='transparent'">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Tool-specific options -->
                <div id="optionsPanel" class="hidden p-6 border-b space-y-5" style="border-color: var(--border-primary)">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-medium mb-2 block" style="color: var(--text-secondary)">Start Time</label>
                            <input type="text" value="00:00" placeholder="00:00" class="w-full rounded-lg px-4 py-2.5 text-sm">
                        </div>
                        <div>
                            <label class="text-sm font-medium mb-2 block" style="color: var(--text-secondary)">End Time</label>
                            <input type="text" value="00:30" placeholder="00:30" class="w-full rounded-lg px-4 py-2.5 text-sm">
                        </div>
                    </div>
                </div>

                <div id="actionArea" class="hidden p-6">
                    <button onclick="processVideo()" id="processBtn"
                            class="w-full h-12 rounded-xl text-sm font-medium text-white transition-all flex items-center justify-center gap-2 hover:opacity-90" style="background: var(--accent-solid)">
                        <i data-lucide="scissors" class="w-4 h-4"></i>
                        <span id="processBtnText">Trim Video</span>
                    </button>
                </div>

                <div id="progressArea" class="hidden p-6 border-b" style="border-color: var(--border-primary)">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-sm" style="color: var(--text-secondary)">Trimming...</span>
                        <span id="progressPercent" class="text-sm font-mono" style="color: var(--accent-text)">0%</span>
                    </div>
                    <div class="w-full h-2 rounded-full overflow-hidden" style="background: var(--bg-input)">
                        <div id="progressBar" class="h-full rounded-full transition-all duration-300" style="width:0%; background: var(--accent-solid)"></div>
                    </div>
                </div>

                <div id="resultArea" class="hidden p-6">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: var(--accent-bg)">
                            <i data-lucide="check" class="w-4 h-4" style="color: var(--accent-text)"></i>
                        </div>
                        <span class="text-sm font-medium" style="color: var(--accent-text)">Trim complete!</span>
                    </div>
                    <button onclick="alert('Demo: Download would start here')"
                            class="h-12 px-8 rounded-xl text-sm font-medium transition-colors flex items-center gap-2" style="background: var(--text-primary); color: var(--bg-body);">
                        <i data-lucide="download" class="w-4 h-4"></i> Download Trimmed Video
                    </button>
                </div>
            </div>

            <div class="mt-8 flex flex-wrap gap-2">
                <span class="text-xs px-3 py-1.5 rounded-lg" style="color: var(--text-muted); background: var(--bg-input)">#trim</span>
                <span class="text-xs px-3 py-1.5 rounded-lg" style="color: var(--text-muted); background: var(--bg-input)">#cut</span>
                <span class="text-xs px-3 py-1.5 rounded-lg" style="color: var(--text-muted); background: var(--bg-input)">#clip</span>
            </div>
        </div>
    </main>

    <footer style="background: var(--bg-footer); border-top: 1px solid var(--border-primary)">
        <div class="max-w-7xl mx-auto px-6 py-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <a href="../index.html" class="flex items-center gap-2.5">
                    <div class="w-7 h-7 bg-blue-500 rounded-md flex items-center justify-center">
                        <i data-lucide="wrench" class="w-3.5 h-3.5 text-white"></i>
                    </div>
                    <span class="text-sm font-semibold" style="color: var(--text-primary)">Tool<span class="text-blue-400">Box</span></span>
                </a>
                <p class="text-xs" style="color: var(--text-muted)">All tools run locally. No data uploaded.</p>
                <p class="text-xs" style="color: var(--text-muted)">© 2025 ToolBox</p>
            </div>
        </div>
    </footer>

    <script>
    // =============================================
    //  🎨 AUTO THEME (Reads from Home Page Toggle)
    // =============================================
    (function() {
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        function applyTheme() {
            const saved = localStorage.getItem('toolbox-theme');
            const theme = saved || getSystemTheme();
            document.documentElement.setAttribute('data-theme', theme);
        }
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
            if (!localStorage.getItem('toolbox-theme')) applyTheme();
        });
        // Listen for manual changes from Home page if opened in another tab
        window.addEventListener('storage', (e) => {
            if (e.key === 'toolbox-theme') applyTheme();
        });
        applyTheme();
    })();

    // =============================================
    //  VIDEO TRIM LOGIC
    // =============================================
    function handleFile(input) {
        const file = input.files[0]; if (!file) return;
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileSize').textContent = formatSize(file.size);
        document.getElementById('fileInfo').classList.remove('hidden');
        document.getElementById('optionsPanel').classList.remove('hidden');
        document.getElementById('actionArea').classList.remove('hidden');
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('progressArea').classList.add('hidden');
    }
    function removeFile() {
        document.getElementById('fileInput').value = '';
        document.getElementById('fileInfo').classList.add('hidden');
        document.getElementById('optionsPanel').classList.add('hidden');
        document.getElementById('actionArea').classList.add('hidden');
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('progressArea').classList.add('hidden');
    }
    function processVideo() {
        const btn = document.getElementById('processBtn');
        const btnText = document.getElementById('processBtnText');
        btn.disabled = true; btn.style.opacity = '0.5'; btnText.textContent = 'Processing...';
        document.getElementById('progressArea').classList.remove('hidden');
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15 + 5;
            if (progress >= 100) { progress = 100; clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('progressArea').classList.add('hidden');
                    document.getElementById('actionArea').classList.add('hidden');
                    document.getElementById('resultArea').classList.remove('hidden');
                    btn.disabled = false; btn.style.opacity = '1'; btnText.textContent = 'Trim Video';
                }, 500);
            }
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
        }, 200);
    }
    function formatSize(b) { if(!b) return '0 B'; const k=1024,s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(2))+' '+s[i]; }
    
    const dz = document.getElementById('dropZone');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = 'var(--accent-border)'; });
    dz.addEventListener('dragleave', () => { dz.style.borderColor = 'var(--border-primary)'; });
    dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor = 'var(--border-primary)'; const f=e.dataTransfer.files[0]; if(f){const i=document.getElementById('fileInput'),d=new DataTransfer();d.items.add(f);i.files=d.files;handleFile(i);} });
    
    lucide.createIcons();
    </script>

</body>
</html>
