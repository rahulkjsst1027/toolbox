<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDEO_TRIM_NAME - ToolBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #050505; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 h-16 bg-[#050505]/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto h-full px-6 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-2.5">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="wrench" class="w-4 h-4 text-white"></i>
                </div>
                <span class="text-lg font-semibold tracking-tight">Tool<span class="text-blue-400">Box</span></span>
            </a>
            <a href="../index.html" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-neutral-400 hover:text-white hover:bg-white/5 transition-all">
                <i data-lucide="home" class="w-4 h-4"></i> Home
            </a>
        </div>
    </nav>

    <main class="pt-16">
        <div class="max-w-5xl mx-auto px-6 py-12">

            <!-- ✏️ Breadcrumb - category aur name change karo -->
            <div class="animate-fade-up flex items-center gap-2 text-sm text-neutral-500 mb-8">
                <a href="../index.html" class="hover:text-white transition-colors flex items-center gap-1.5">
                    <i data-lucide="home" class="w-3.5 h-3.5"></i> Home
                </a>
                <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
                <span class="text-neutral-600">Video</span>
                <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
                <span class="text-neutral-300">Video Trim</span>
            </div>

            <!-- ✏️ Tool Header - icon, color, name, description change karo -->
            <div class="animate-fade-up flex flex-col md:flex-row md:items-center gap-6 mb-10">
                <div class="w-16 h-16 rounded-2xl border flex items-center justify-center shrink-0"
                     style="background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.2)">
                    <i data-lucide="scissors" class="w-7 h-7 text-green-400"></i>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-medium tracking-tight text-white mb-2">Video Trim</h1>
                    <p class="text-neutral-400 font-light leading-relaxed">Cut and trim video clips to the exact length you need.</p>
                </div>
            </div>

            <!-- Workspace -->
            <div class="animate-fade-up rounded-2xl border border-white/5 bg-neutral-900/30 overflow-hidden">

                <div id="dropZone" class="p-12 text-center border-b border-white/5 cursor-pointer hover:bg-white/[0.02] transition-colors"
                     onclick="document.getElementById('fileInput').click()">
                    <div class="w-16 h-16 rounded-full border-2 border-dashed border-white/10 flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="upload-cloud" class="w-7 h-7 text-neutral-500"></i>
                    </div>
                    <p class="text-neutral-300 font-medium mb-1">Drop your video here or click to browse</p>
                    <p class="text-neutral-600 text-sm">Supports: MP4, WebM, MOV</p>
                    <input type="file" id="fileInput" accept="video/*" class="hidden" onchange="handleFile(this)">
                </div>

                <div id="fileInfo" class="hidden p-6 border-b border-white/5">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:rgba(34,197,94,0.1)">
                                <i data-lucide="scissors" class="w-5 h-5 text-green-400"></i>
                            </div>
                            <div>
                                <p id="fileName" class="text-sm font-medium text-white"></p>
                                <p id="fileSize" class="text-xs text-neutral-500"></p>
                            </div>
                        </div>
                        <button onclick="removeFile()" class="p-2 rounded-lg hover:bg-white/5 transition-colors">
                            <i data-lucide="x" class="w-4 h-4 text-neutral-400"></i>
                        </button>
                    </div>
                </div>

                <!-- ✏️ Tool-specific options yahan change karo -->
                <div id="optionsPanel" class="hidden p-6 border-b border-white/5 space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm text-neutral-300 font-medium mb-2 block">Start Time</label>
                            <input type="text" value="00:00" placeholder="00:00" class="w-full bg-neutral-800 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-green-500/30">
                        </div>
                        <div>
                            <label class="text-sm text-neutral-300 font-medium mb-2 block">End Time</label>
                            <input type="text" value="00:30" placeholder="00:30" class="w-full bg-neutral-800 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-green-500/30">
                        </div>
                    </div>
                </div>

                <div id="actionArea" class="hidden p-6">
                    <button onclick="processVideo()" id="processBtn"
                            class="w-full h-12 rounded-xl text-sm font-medium bg-green-500 text-white hover:bg-green-600 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="scissors" class="w-4 h-4"></i>
                        <span id="processBtnText">Trim Video</span>
                    </button>
                </div>

                <div id="progressArea" class="hidden p-6 border-b border-white/5">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-sm text-neutral-300">Trimming...</span>
                        <span id="progressPercent" class="text-sm font-mono text-green-400">0%</span>
                    </div>
                    <div class="w-full h-2 bg-neutral-800 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full rounded-full transition-all duration-300 bg-green-500" style="width:0%"></div>
                    </div>
                </div>

                <div id="resultArea" class="hidden p-6">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-8 h-8 rounded-full bg-green-500/10 flex items-center justify-center">
                            <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
                        </div>
                        <span class="text-sm font-medium text-green-400">Trim complete!</span>
                    </div>
                    <button onclick="alert('Demo: Download would start here')"
                            class="h-12 px-8 bg-white text-black rounded-xl text-sm font-medium hover:bg-neutral-200 transition-colors flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Download Trimmed Video
                    </button>
                </div>
            </div>

            <div class="mt-8 flex flex-wrap gap-2">
                <span class="text-xs text-neutral-600 bg-neutral-900 px-3 py-1.5 rounded-lg">#trim</span>
                <span class="text-xs text-neutral-600 bg-neutral-900 px-3 py-1.5 rounded-lg">#cut</span>
                <span class="text-xs text-neutral-600 bg-neutral-900 px-3 py-1.5 rounded-lg">#clip</span>
            </div>
        </div>
    </main>

    <footer class="border-t border-white/5 bg-[#030303]">
        <div class="max-w-7xl mx-auto px-6 py-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <a href="../index.html" class="flex items-center gap-2.5">
                    <div class="w-7 h-7 bg-blue-500 rounded-md flex items-center justify-center">
                        <i data-lucide="wrench" class="w-3.5 h-3.5 text-white"></i>
                    </div>
                    <span class="text-sm font-semibold">Tool<span class="text-blue-400">Box</span></span>
                </a>
                <p class="text-neutral-600 text-xs">All tools run locally. No data uploaded.</p>
                <p class="text-neutral-600 text-xs">© 2025 ToolBox</p>
            </div>
        </div>
    </footer>

    <script>
    function handleFile(input) {
        const file = input.files[0]; if (!file) return;
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileSize').textContent = formatSize(file.size);
        document.getElementById('fileInfo').classList.remove('hidden');
        document.getElementById('optionsPanel').classList.remove('hidden');
        document.getElementById('actionArea').classList.remove('hidden');
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('progressArea').classList.add('hidden');
    }
    function removeFile() {
        document.getElementById('fileInput').value = '';
        document.getElementById('fileInfo').classList.add('hidden');
        document.getElementById('optionsPanel').classList.add('hidden');
        document.getElementById('actionArea').classList.add('hidden');
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('progressArea').classList.add('hidden');
    }
    function processVideo() {
        const btn = document.getElementById('processBtn');
        const btnText = document.getElementById('processBtnText');
        btn.disabled = true; btn.style.opacity = '0.5'; btnText.textContent = 'Processing...';
        document.getElementById('progressArea').classList.remove('hidden');
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15 + 5;
            if (progress >= 100) { progress = 100; clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('progressArea').classList.add('hidden');
                    document.getElementById('actionArea').classList.add('hidden');
                    document.getElementById('resultArea').classList.remove('hidden');
                    btn.disabled = false; btn.style.opacity = '1'; btnText.textContent = 'Trim Video';
                }, 500);
            }
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
        }, 200);
    }
    function formatSize(b) { if(!b) return '0 B'; const k=1024,s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(2))+' '+s[i]; }
    const dz = document.getElementById('dropZone');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = 'rgba(34,197,94,0.4)'; });
    dz.addEventListener('dragleave', () => { dz.style.borderColor = ''; });
    dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor = ''; const f=e.dataTransfer.files[0]; if(f){const i=document.getElementById('fileInput'),d=new DataTransfer();d.items.add(f);i.files=d.files;handleFile(i);} });
    lucide.createIcons();
    </script>

</body>
</html>
